<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>双栏笔记</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="笔记列表">
        <header class="sidebar-header">
          <div>
            <p class="eyebrow">Notes</p>
            <h1>我的笔记</h1>
          </div>
          <button class="icon-button primary" id="addNote" type="button" aria-label="新建笔记" title="新建笔记">
            +
          </button>
        </header>

        <label class="search-box">
          <span class="sr-only">搜索笔记</span>
          <input id="searchInput" type="search" placeholder="搜索标题或内容" autocomplete="off" />
        </label>

        <nav class="note-list" id="noteList" aria-label="所有笔记"></nav>
      </aside>

      <section class="editor-pane" aria-label="笔记内容">
        <div class="editor-empty" id="emptyState" hidden>
          <h2>还没有选中的笔记</h2>
          <p>新建一条笔记，或从左侧列表选择已有内容。</p>
        </div>

        <article class="editor" id="editor">
          <div class="editor-toolbar">
            <input id="titleInput" class="title-input" type="text" maxlength="80" aria-label="笔记标题" />
            <button class="delete-button" id="deleteNote" type="button">删除</button>
          </div>

          <textarea id="bodyInput" class="body-input" aria-label="笔记正文"></textarea>

          <footer class="editor-footer">
            <span id="saveStatus">已保存</span>
            <span id="wordCount">0 字</span>
          </footer>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
